<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Instagram</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }
    .card {
      text-align: center;
      background: rgba(0,0,0,0.5);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
    h1 {
      margin-bottom: 10px;
    }
    p {
      margin-bottom: 20px;
    }
    a {
      text-decoration: none;
      background: white;
      color: #333;
      padding: 12px 20px;
      border-radius: 30px;
      font-weight: bold;
      transition: 0.3s;
    }
    a:hover {
      background: #ddd;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Follow Me on Instagram</h1>
    <p>Click below to visit my profile</p>
    <a href="https://instagram.com/@hajipur_starvlogger" target="_blank">Open Instagram</a>
  </div>
</body>
</html>
